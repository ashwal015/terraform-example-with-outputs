name: Terraform Workflow

on: [push,workflow_dispatch]

jobs:
    terraform-apply-and-deploy-website:
        runs-on: ubuntu-latest
        if: github.event_name == 'push'
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3

            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws-region: eu-central-1

            - name: Terraform Init
              run: terraform init
            
            - name: Terraform Apply
              run: terraform apply --auto-approve

            - name: ssh setup
              run: |
                sleep 10
                mkdir -p ~/.ssh
                printf '%s\n' "${{secrets.SSH_PRIVATE_KEY}}" > ~/.ssh/deploy_key
                chmod 600 ~/.ssh/deploy_key
                for ip in $(terraform output -json public_ips | jq -r ".[]"); do
                ssh-keyscan -H $ip >> ~/.ssh/known_hosts
                done
            
            - name: install nginx on ec2
              run: |
                  for ip in $(terraform output -json public_ips | jq -r ".[]"); do
                  ssh -i ~/.ssh/deploy_key ubuntu@$ip "sudo apt update && sudo apt install nginx -y"
                  done

            - name: deploy website
              run: |
                for ip in $(terraform output -json public_ips | jq -r ".[]"); do
                scp -i ~/.ssh/deploy_key index.html ubuntu@$ip:/home/ubuntu/index.html
                ssh -i ~/.ssh/deploy_key ubuntu@$ip "sudo cp /home/ubuntu/index.html /var/www/html/index.html"
                done
    
    
    terraform-destroy:
        runs-on: ubuntu-latest
        if: github.event_name == 'workflow_dispatch'
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v4

            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v6
              with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws-region: eu-central-1

            - name: Terraform Init
              run: terraform init
            
            - name: Terraform Destroy
              run: terraform destroy -auto-approve
